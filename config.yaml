# anygo 境内入口配置，用户自行区分
listen: "0.0.0.0:44713"        # 监听地址，接受本地TCP连接
remote: "152.69.235.79:44713"    # 境外出口服务器地址
sni: "bing.com"     # TLS伪装域名
insecure: true     # 真实域名证书请注释本行
password: "lMgab3FiW5"     # 与出口保持一致

# Session管理（可选）
idle_session_check_interval: "30s"
idle_session_timeout: "5s"
min_idle_session: 2


# anygo 境外出口配置，用户自行区分
listen: "0.0.0.0:44713"         # 监听地址，接受境内入口连接
remote: "127.0.0.1:25256"  # 目标服务器
sni: "bing.com"     # TLS伪装域名
password: "lMgab3FiW5"     # 与入口保持一致

# TLS证书（支持 Let's Encrypt 或自签证书）
cert: "/var/anygo/server.crt"
key:  "/var/anygo/server.key"

# 自定义 PaddingScheme（可选，留空使用默认值）
padding_scheme: |
   stop=8
   0=30-30
   1=100-400
   2=400-500,c,500-1000,c,500-1000,c,500-1000,c,500-1000
   3=9-9,500-1000
   4=500-1000
   5=500-1000
   6=500-1000
   7=500-1000
