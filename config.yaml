# anygo 境内入口配置，用户自行区分
listen: "0.0.0.0:1080"        # 监听地址，接受本地TCP连接
remote: "your-vps.com:443"    # 境外出口服务器地址
sni: "www.cloudflare.com"     # TLS伪装域名（使用真实存在的域名）
password: "your-password"     # 与出口保持一致

# 自签证书模式（二选一）
# sni 可省略，改为：
insecure: true

# Session管理（可选）
idle_session_check_interval: "30s"
idle_session_timeout: "5s"
min_idle_session: 2


# anygo 境外出口配置，用户自行区分
listen: "0.0.0.0:443"         # 监听地址，接受境内入口连接
remote: "149.154.167.51:443"  # 目标服务器（如 Telegram）
password: "your-password"     # 与入口保持一致

# TLS证书（支持 Let's Encrypt 或自签证书）
cert: "/etc/anygo/server.crt"
key:  "/etc/anygo/server.key"

# 自定义 PaddingScheme（可选，留空使用默认值）
padding_scheme: |
   stop=8
   0=30-30
   1=100-400
   2=400-500,c,500-1000,c,500-1000,c,500-1000,c,500-1000
   3=9-9,500-1000
   4=500-1000
   5=500-1000
   6=500-1000
   7=500-1000
